<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>for Blake 💐</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,600&family=DM+Sans:wght@300;400&family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0b0e;
      color: #ede0cc;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    .petal {
      position: fixed;
      font-size: 1.2rem;
      opacity: 0;
      animation: fall linear infinite;
      pointer-events: none;
      user-select: none;
    }

    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      max-width: 420px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .bouquet {
      font-size: 3.5rem;
      margin-bottom: 1.2rem;
      display: block;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg); }
    }

    .script {
      font-family: 'Dancing Script', cursive;
      color: #c9995a;
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 11vw, 5rem);
      font-style: italic;
      font-weight: 400;
      color: #f5ead8;
      line-height: 1;
      margin-bottom: 1.8rem;
    }

    .message {
      font-size: 0.92rem;
      color: #a89880;
      line-height: 1.9;
      margin-bottom: 1.2rem;
    }

    .time {
      font-size: 0.78rem;
      color: #5a4e42;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 1.8rem;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(201,153,90,0.3);
      margin: 0 auto 2rem;
    }

    /* LOCATION CARDS */
    .locations {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
      text-align: left;
    }

    .loc-card {
      border: 1px solid rgba(201,153,90,0.18);
      border-radius: 12px;
      overflow: hidden;
    }

    .loc-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.9rem 1.1rem;
      background: rgba(255,255,255,0.02);
    }

    .loc-icon { font-size: 1.3rem; }
    .loc-info { flex: 1; }

    .loc-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-style: italic;
      color: #e8c88a;
      display: block;
}
